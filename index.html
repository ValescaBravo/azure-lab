<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azure Cloud Lab — Valesca Bravo 2026</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#1d085e', light: '#2d1278', dark: '#130440' },
            teal: { DEFAULT: '#13d6c1', dark: '#0a9a88', light: '#3de8d6' },
          }
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sora', sans-serif;
      background: #09071a;
      color: #e8e6f0;
      line-height: 1.6;
      min-height: 100vh;
    }
    /* ---- SYNTAX: Azure CLI / Bicep / KQL ---- */
    .code-block {
      background: #1e1e1e;
      border-radius: 10px;
      padding: .9rem 1.1rem;
      font-family: 'DM Mono', monospace;
      font-size: .78rem;
      line-height: 1.75;
      overflow-x: auto;
      border: 1px solid #2a2a3e;
      white-space: pre;
    }
    .az-kw   { color: #569cd6; font-weight: 500; }
    .az-teal { color: #4ec9b0; font-weight: 500; }
    .az-str  { color: #ce9178; }
    .az-cmt  { color: #6a9955; font-style: italic; }
    .az-res  { color: #c792ea; }
    .az-flag { color: #fb923c; }
    .az-num  { color: #b5cea8; }

    /* ---- SCROLLBAR ---- */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #110e2e; }
    ::-webkit-scrollbar-thumb { background: #13d6c1; border-radius: 3px; }
    .tab-scroll { overflow-x: auto; scrollbar-width: thin; }
    .tab-scroll::-webkit-scrollbar { height: 3px; }

    /* ---- ANIMATIONS ---- */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp .32s ease forwards; }
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(19,214,193,.35); }
      70%  { box-shadow: 0 0 0 10px rgba(19,214,193,0); }
      100% { box-shadow: 0 0 0 0 rgba(19,214,193,0); }
    }

    /* ---- RANGE INPUT ---- */
    input[type=range] {
      -webkit-appearance: none;
      height: 4px;
      background: #221b56;
      border-radius: 4px;
      outline: none;
      width: 100%;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #13d6c1;
      cursor: pointer;
    }

    /* ---- CARDS ---- */
    .service-card {
      background: linear-gradient(135deg,#120a3a 0%,#0e0829 100%);
      border: 1px solid #2a2060;
      border-radius: 12px;
      transition: border-color .2s, transform .2s;
    }
    .service-card:hover { border-color: #13d6c1; transform: translateY(-2px); }

    /* ---- GDPR BADGE ---- */
    .gdpr-badge {
      background: #064e3b;
      border: 1px solid #10b981;
      color: #10b981;
      border-radius: 9999px;
      font-size: .65rem;
      font-family: 'DM Mono', monospace;
      padding: 2px 8px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    /* ---- TABS ---- */
    .tab-btn {
      white-space: nowrap;
      padding: .45rem .9rem;
      border-radius: 8px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .18s;
      background: transparent;
      color: #8b87b0;
    }
    .tab-btn.active {
      background: #1d085e;
      color: #13d6c1;
      border-color: #13d6c1;
    }
    .tab-btn:hover:not(.active) { color: #e8e6f0; background: #16103a; }

    /* ---- QUIZ ---- */
    .quiz-opt {
      background: #120a3a;
      border: 1px solid #2a2060;
      border-radius: 8px;
      padding: .65rem 1rem;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      font-size: .85rem;
    }
    .quiz-opt:hover  { border-color: #13d6c1; background: #1a1250; }
    .quiz-opt.correct { border-color: #10b981; background: #064e3b20; color: #10b981; }
    .quiz-opt.wrong   { border-color: #ef4444; background: #7f1d1d20; color: #f87171; }

    /* ---- SVG DECISION TREE ---- */
    .tree-node { cursor: pointer; transition: opacity .2s; }
    .tree-node:hover { opacity: .85; }

    /* ---- COMPARE TABLE ---- */
    .cmp-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    .cmp-table th, .cmp-table td {
      border: 1px solid #2a2060;
      padding: .6rem .75rem;
      text-align: left;
      vertical-align: top;
    }
    .cmp-table th { background: #1d085e; color: #13d6c1; font-weight: 600; }
    .cmp-table tr:nth-child(even) td { background: #0e0829; }
    .cmp-table .winner { color: #10b981; font-weight: 600; }
    .cmp-table .neutral { color: #fbbf24; }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useCallback } = React;

/* ============================================================
   CONSTANTS
   ============================================================ */
const TABS = [
  { id:'fundamentals', label:'Azure Fundamentals' },
  { id:'data',         label:'Data & Analytics' },
  { id:'m365',         label:'Microsoft 365 Integration' },
  { id:'compute',      label:'Compute' },
  { id:'ai',           label:'AI & Cognitive Services' },
  { id:'storage',      label:'Storage & Databases' },
  { id:'cases',        label:'Real-World Cases' },
  { id:'cheatsheet',   label:'Cheat Sheet' },
];

/* ============================================================
   SHARED COMPONENTS
   ============================================================ */
function Chip({ children, color='teal' }) {
  const cls = color === 'green'
    ? 'gdpr-badge'
    : 'inline-block text-xs font-mono px-2 py-0.5 rounded-full border border-teal-DEFAULT text-teal-DEFAULT bg-navy-light';
  return <span className={cls}>{children}</span>;
}

function CodeBlock({ children }) {
  return (
    <div className="code-block text-xs" dangerouslySetInnerHTML={{ __html: children }} />
  );
}

function SectionTitle({ children }) {
  return (
    <h2 className="text-xl font-bold text-white mb-1" style={{fontFamily:'Sora,sans-serif'}}>
      {children}
    </h2>
  );
}

function ServiceCard({ title, badge, gdpr, children }) {
  return (
    <div className="service-card p-5 mb-4 fade-up">
      <div className="flex flex-wrap items-center gap-2 mb-3">
        <h3 className="text-base font-semibold text-teal-DEFAULT">{title}</h3>
        {badge && <span className="text-xs font-mono px-2 py-0.5 rounded-full border border-purple-400 text-purple-300 bg-purple-900/20">{badge}</span>}
        {gdpr && <span className="gdpr-badge">GDPR EU ✓</span>}
      </div>
      {children}
    </div>
  );
}

function Label({ children }) {
  return <p className="text-xs font-mono text-gray-400 uppercase tracking-widest mb-1">{children}</p>;
}

/* ============================================================
   PHASE 2 — FUNDAMENTALS + DATA TABS
   ============================================================ */
function FundamentalsTab() {
  const [openCard, setOpenCard] = useState(null);
  const toggle = id => setOpenCard(openCard === id ? null : id);

  const concepts = [
    {
      id:'sub', title:'Subscriptions & Resource Groups',
      badge:'Core concept',
      analogy:'A subscription is your company\'s account with Azure — the billing boundary. A resource group is like a project folder inside that account: everything related to a campaign analytics pipeline lives in one group, so you can delete or move it together.',
      detail:'Resource groups are not just containers — they are the unit of management. You apply RBAC, tags, locks and policies at RG level. In practice, scope resource groups by lifecycle: dev/test resources in one RG, production in another.',
      code:`<span class="az-cmt"># Create a resource group in Ireland (West Europe is Dublin)</span>
<span class="az-kw">az</span> group <span class="az-flag">create</span> \
  <span class="az-flag">--name</span> <span class="az-str">"rg-analytics-prod-001"</span> \
  <span class="az-flag">--location</span> <span class="az-str">"westeurope"</span> \
  <span class="az-flag">--tags</span> <span class="az-str">env=prod team=analytics gdpr=true</span>`,
      cost:'Free — no charge for resource groups themselves.',
      risk:'Mixing prod and dev resources in the same RG means a single accidental delete removes everything. Tag early; enforce with Azure Policy.',
      gdpr: true
    },
    {
      id:'aad', title:'Microsoft Entra ID (Azure AD)',
      badge:'Identity',
      analogy:'Entra ID is the identity layer that connects every Microsoft product. If your company already uses Microsoft 365 and you can sign into Teams with your work email, that\'s Entra ID already. Azure just extends the same directory to cloud resources.',
      detail:'Every Azure subscription is backed by an Entra ID tenant. RBAC in Azure grants roles to Entra ID principals (users, groups, service principals). Use Managed Identities for app-to-service auth — no secrets in code.',
      code:`<span class="az-cmt"># Assign Storage Blob Data Reader to a managed identity</span>
<span class="az-kw">az</span> role assignment <span class="az-flag">create</span> \
  <span class="az-flag">--assignee</span> <span class="az-res">&lt;managed-identity-object-id&gt;</span> \
  <span class="az-flag">--role</span> <span class="az-str">"Storage Blob Data Reader"</span> \
  <span class="az-flag">--scope</span> <span class="az-str">"/subscriptions/{sub}/resourceGroups/rg-analytics-prod-001"</span>`,
      cost:'Entra ID Free included. P1 (€5.60/user/mo) for Conditional Access. P2 adds PIM.',
      risk:'Using a shared service principal with Owner rights instead of Managed Identity leaks credentials and creates an unauditable attack surface.',
      gdpr: true
    },
    {
      id:'rbac', title:'RBAC vs ABAC',
      badge:'Security',
      analogy:'RBAC is a job title system: "Analyst" can read, "Engineer" can write, "Admin" can delete. ABAC adds conditions: "Analyst can read *only if* the resource is tagged env=prod and they are in the Ireland office."',
      detail:'Azure RBAC uses role assignments (who, what role, what scope). Azure ABAC (Attribute-Based) extends RBAC with conditions, available on storage and a growing set of services. For GDPR data minimisation, ABAC lets you restrict access to EU-tagged datasets without creating separate roles.',
      code:`<span class="az-cmt"># ABAC: allow read only on blobs tagged classification=public</span>
<span class="az-kw">az</span> role assignment <span class="az-flag">create</span> \
  <span class="az-flag">--assignee</span> <span class="az-str">"analyst@contoso.com"</span> \
  <span class="az-flag">--role</span> <span class="az-str">"Storage Blob Data Reader"</span> \
  <span class="az-flag">--scope</span> <span class="az-str">"/subscriptions/{sub}/resourceGroups/rg-analytics"</span> \
  <span class="az-flag">--condition</span> <span class="az-str">"@Resource[Microsoft.Storage/storageAccounts/blobServices/containers/blobs/tags:classification]=='public'"</span> \
  <span class="az-flag">--condition-version</span> <span class="az-str">"2.0"</span>`,
      cost:'No extra cost. ABAC conditions are part of the RBAC system.',
      risk:'Over-broad Owner assignments at subscription scope. Always assign the least-privileged built-in role at the narrowest scope possible.',
      gdpr: true
    },
    {
      id:'arm', title:'ARM vs Bicep (Infrastructure as Code)',
      badge:'IaC',
      analogy:'ARM templates are the raw JSON that Azure understands natively — verbose and powerful. Bicep is a domain-specific language that compiles to ARM, like TypeScript compiles to JavaScript. You write cleaner code, Azure receives the same JSON.',
      detail:'Bicep is now the recommended IaC path for Azure. It supports modules, type safety and integrates with Azure DevOps and GitHub Actions pipelines. Terraform is also valid if you manage multi-cloud; for Azure-only teams Bicep reduces toolchain complexity.',
      code:`<span class="az-cmt">// Bicep: deploy a storage account in westeurope</span>
<span class="az-kw">param</span> <span class="az-res">location</span> <span class="az-teal">string</span> = <span class="az-str">'westeurope'</span>
<span class="az-kw">param</span> <span class="az-res">storageName</span> <span class="az-teal">string</span>

<span class="az-kw">resource</span> <span class="az-res">storage</span> <span class="az-str">'Microsoft.Storage/storageAccounts@2023-01-01'</span> = {
  name: <span class="az-res">storageName</span>
  location: <span class="az-res">location</span>
  sku: { name: <span class="az-str">'Standard_LRS'</span> }
  kind: <span class="az-str">'StorageV2'</span>
  properties: {
    minimumTlsVersion: <span class="az-str">'TLS1_2'</span>
    allowBlobPublicAccess: <span class="az-num">false</span>
    supportsHttpsTrafficOnly: <span class="az-num">true</span>
  }
}`,
      cost:'Free. Bicep is open-source; ARM deployments have no charge beyond resource costs.',
      risk:'Manually creating resources through the portal instead of IaC leads to config drift. Enforce ARM-only creation with Azure Policy in production subscriptions.',
      gdpr: false
    },
  ];

  return (
    <div className="fade-up">
      <SectionTitle>Azure Fundamentals</SectionTitle>
      <p className="text-sm text-gray-400 mb-6 max-w-2xl">The building blocks every data professional needs before touching a single service. Governance first — services second.</p>

      {concepts.map(c => (
        <ServiceCard key={c.id} title={c.title} badge={c.badge} gdpr={c.gdpr}>
          <p className="text-sm text-gray-300 mb-3" style={{borderLeft:'3px solid #13d6c1',paddingLeft:'12px',fontStyle:'italic'}}>{c.analogy}</p>
          <button onClick={() => toggle(c.id)} className="text-xs font-mono text-teal-DEFAULT hover:text-white transition-colors mb-2 flex items-center gap-1" style={{background:'none',border:'none',cursor:'pointer',padding:0}}>
            {openCard===c.id ? '▾ collapse' : '▸ details + code'}
          </button>
          {openCard===c.id && (
            <div className="fade-up">
              <p className="text-sm text-gray-300 mb-3">{c.detail}</p>
              <CodeBlock>{c.code}</CodeBlock>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
                <div className="rounded-lg p-3" style={{background:'#064e3b20',border:'1px solid #10b98140'}}>
                  <Label>Cost</Label>
                  <p className="text-xs text-green-300">{c.cost}</p>
                </div>
                <div className="rounded-lg p-3" style={{background:'#7f1d1d20',border:'1px solid #ef444440'}}>
                  <Label>Common mistake</Label>
                  <p className="text-xs text-red-300">{c.risk}</p>
                </div>
              </div>
            </div>
          )}
        </ServiceCard>
      ))}

      {/* Management Groups diagram */}
      <div className="service-card p-5 mt-2">
        <h3 className="text-base font-semibold text-teal-DEFAULT mb-4">Scope hierarchy: Management Groups → Subscriptions → Resource Groups → Resources</h3>
        <svg viewBox="0 0 560 160" className="w-full" style={{maxHeight:'160px'}}>
          {[
            {x:20, w:520, y:10, h:34, label:'Management Group (Root)', fill:'#1d085e', stroke:'#4c3aaa'},
            {x:60, w:440, y:54, h:34, label:'Subscription (billing boundary)', fill:'#160a42', stroke:'#13d6c1'},
            {x:100, w:360, y:98, h:34, label:'Resource Group (lifecycle unit)', fill:'#0e0829', stroke:'#0a9a88'},
            {x:140, w:280, y:138, h:24, label:'Resources (VMs, DBs, Functions …)', fill:'#08061a', stroke:'#2a2060'},
          ].map((r,i) => (
            <g key={i}>
              <rect x={r.x} y={r.y} width={r.w} height={r.h} rx="6" fill={r.fill} stroke={r.stroke} strokeWidth="1.5"/>
              <text x={r.x+r.w/2} y={r.y+r.h/2+5} textAnchor="middle" fill="#e8e6f0" fontSize="11" fontFamily="Sora,sans-serif">{r.label}</text>
            </g>
          ))}
        </svg>
      </div>
    </div>
  );
}

/* ---- DATA TAB ---- */
function DataTab() {
  const [activeNode, setActiveNode] = useState(null);

  const mdwNodes = [
    {id:'src',    x:30,  y:100, w:110, h:40, label:'Sources',        sub:'SQL Server, SharePoint, APIs', color:'#2d1278'},
    {id:'adf',    x:175, y:80,  w:110, h:40, label:'Azure Data Factory', sub:'ELT orchestration', color:'#1d085e'},
    {id:'adls',   x:320, y:60,  w:120, h:40, label:'ADLS Gen2',      sub:'Data Lake (raw → curated)', color:'#0a9a88'},
    {id:'synapse',x:320, y:130, w:120, h:40, label:'Azure Synapse',  sub:'SQL + Spark unified', color:'#1d085e'},
    {id:'pbi',    x:470, y:95,  w:100, h:40, label:'Power BI',       sub:'Direct Lake mode', color:'#13d6c1'},
  ];
  const arrows = [
    {x1:140,y1:120,x2:175,y2:100},{x1:285,y1:95,x2:320,y2:75},
    {x1:285,y1:95,x2:320,y2:145},{x1:440,y1:75,x2:470,y2:105},
    {x1:440,y1:150,x2:470,y2:115},
  ];

  const services = [
    {
      id:'adf', title:'Azure Data Factory',
      analogy:'ADF is like Power Query but for production pipelines at enterprise scale. You build data flows visually (no-code), schedule them, monitor runs, and connect to hundreds of sources — all managed, versioned and secured.',
      code:`<span class="az-cmt"># Deploy ADF from Bicep</span>
<span class="az-kw">resource</span> <span class="az-res">adf</span> <span class="az-str">'Microsoft.DataFactory/factories@2018-06-01'</span> = {
  name: <span class="az-str">'adf-analytics-prod'</span>
  location: <span class="az-str">'westeurope'</span>
  identity: { type: <span class="az-str">'SystemAssigned'</span> }
  properties: {
    repoConfiguration: {
      type: <span class="az-str">'FactoryGitHubConfiguration'</span>
      repositoryName: <span class="az-str">'data-pipelines'</span>
    }
  }
}`,
      cost:'€0.001 per activity run. Orchestration: €0.25/1,000 runs. Data movement: €0.25/DIU-hour.',
      risk:'Running pipelines without triggers on a schedule burns DIU hours. Always set activity timeouts and retry policies.',
      gdpr:true, badge:'ETL / ELT'
    },
    {
      id:'adls', title:'Azure Data Lake Storage Gen2',
      analogy:'ADLS Gen2 is a folder structure with enterprise permissions bolted on top of Blob Storage. Think of it as OneDrive at petabyte scale, where every folder can have its own ACL and Spark can read it natively.',
      code:`<span class="az-cmt"># Create container and upload raw data</span>
<span class="az-kw">az</span> storage fs <span class="az-flag">create</span> \
  <span class="az-flag">--name</span> <span class="az-str">raw</span> \
  <span class="az-flag">--account-name</span> <span class="az-res">datalakeprod</span> \
  <span class="az-flag">--auth-mode</span> <span class="az-str">login</span>

<span class="az-kw">az</span> storage fs file <span class="az-flag">upload</span> \
  <span class="az-flag">--source</span> <span class="az-str">./campaigns.parquet</span> \
  <span class="az-flag">--path</span> <span class="az-str">marketing/2026/campaigns.parquet</span> \
  <span class="az-flag">--file-system</span> <span class="az-str">raw</span> \
  <span class="az-flag">--account-name</span> <span class="az-res">datalakeprod</span>`,
      cost:'Hot tier: ~€0.018/GB/month. Cool: ~€0.01/GB/month. Transactions on top.',
      risk:'Storing all data in the hot tier. Move data older than 30 days to cool/archive with lifecycle management policies.',
      gdpr:true, badge:'Storage'
    },
    {
      id:'synapse', title:'Azure Synapse Analytics',
      analogy:'Synapse is the Swiss Army knife of Azure data. It combines a SQL data warehouse (Dedicated SQL Pool), serverless SQL against your data lake, Apache Spark for big data, and pipelines (ADF-based) — all in one unified workspace.',
      code:`<span class="az-cmt">-- Serverless SQL: query parquet directly from ADLS</span>
<span class="az-kw">SELECT</span>
    campaign_name,
    <span class="az-teal">SUM</span>(impressions)   <span class="az-kw">AS</span> total_impressions,
    <span class="az-teal">SUM</span>(conversions)  <span class="az-kw">AS</span> total_conversions,
    <span class="az-teal">ROUND</span>(<span class="az-teal">SUM</span>(spend) / <span class="az-teal">NULLIF</span>(<span class="az-teal">SUM</span>(conversions),<span class="az-num">0</span>), <span class="az-num">2</span>) <span class="az-kw">AS</span> cpa
<span class="az-kw">FROM</span>
    <span class="az-teal">OPENROWSET</span>(
        <span class="az-teal">BULK</span> <span class="az-str">'https://datalakeprod.dfs.core.windows.net/curated/marketing/**'</span>,
        <span class="az-teal">FORMAT</span> = <span class="az-str">'PARQUET'</span>
    ) <span class="az-kw">AS</span> r
<span class="az-kw">GROUP BY</span> campaign_name
<span class="az-kw">ORDER BY</span> total_conversions <span class="az-kw">DESC</span>;`,
      cost:'Dedicated SQL Pool: from €0.85/DWU100/hr. Serverless SQL: €4.65/TB scanned. Spark: €0.16/vCore-hr.',
      risk:'Keeping Dedicated SQL Pool running 24/7 when you only query during business hours. Pause it outside working hours — saves 60–70% on compute.',
      gdpr:true, badge:'Unified Analytics'
    },
    {
      id:'databricks', title:'Databricks on Azure vs Synapse Spark',
      analogy:'Both run Apache Spark. Databricks is the specialist tool: better Delta Lake support, MLflow built-in, collaborative notebooks, Unity Catalog for governance. Synapse Spark is convenient if your team is already in the Azure portal and the workload is moderate.',
      code:`<span class="az-cmt"># When to choose: decision matrix</span>
<span class="az-cmt"># Databricks → MLOps, Delta Live Tables, data science teams</span>
<span class="az-cmt"># Synapse Spark → occasional Spark in an analytics-first team</span>
<span class="az-cmt"># Cost: Databricks DBUs on top of VM cost vs Synapse vCore-hr</span>

<span class="az-kw">%python</span>
<span class="az-cmt"># Databricks: read Delta table from ADLS Gen2</span>
df = spark.read.<span class="az-teal">format</span>(<span class="az-str">"delta"</span>).<span class="az-teal">load</span>(
    <span class="az-str">"abfss://curated@datalakeprod.dfs.core.windows.net/marketing"</span>
)
df.<span class="az-teal">groupBy</span>(<span class="az-str">"channel"</span>).<span class="az-teal">agg</span>({<span class="az-str">"spend"</span>: <span class="az-str">"sum"</span>}).<span class="az-teal">show</span>()`,
      cost:'Databricks: VM cost + DBU charge (€0.07–0.55/DBU depending on tier). Synapse Spark: €0.16/vCore-hr, no extra DBU.',
      risk:'Running large Databricks clusters on Premium tier when Standard suffices for ETL. Rightsizing cluster type (Memory Optimised for ML, Compute Optimised for ETL) reduces costs significantly.',
      gdpr:false, badge:'Spark'
    },
  ];

  const [open2, setOpen2] = useState(null);

  return (
    <div className="fade-up">
      <SectionTitle>Data & Analytics</SectionTitle>

function TCOCalculator() {
  const [gb, setGb] = useState(500);
  const [users, setUsers] = useState(20);
  const [queries, setQueries] = useState(5000);

  // On-prem: server hardware amortised + licences + admin
  const onPremBase = 1200;
  const onPremPerGB = 0.5;
  const onPremPerUser = 15;
  const onPrem = Math.round(onPremBase + gb * onPremPerGB + users * onPremPerUser);

  // Azure SQL Database (General Purpose serverless)
  const azSqlBase = 14;
  const azSqlPerGB = 0.115;
  const azSqlCompute = Math.round(users * 4.2); // compute scales with concurrency
  const azSql = Math.round(azSqlBase + gb * azSqlPerGB + azSqlCompute);

  // Azure Synapse Serverless (pay per scan)
  const scanTB = (queries * 0.00002 * gb) / 1000; // rough estimate: 20KB avg scan ratio of total GB
  const synBase = 0;
  const synPerScan = scanTB * 4.65;
  const synStorage = gb * 0.018;
  const synapse = Math.round(synBase + synPerScan + synStorage + 30); // 30 = ADF orchestration

  const max = Math.max(onPrem, azSql, synapse, 1);
  const bars = [
    { label:'On-Premises SQL Server', val:onPrem, color:'#4c3aaa' },
    { label:'Azure SQL Database',      val:azSql,  color:'#13d6c1' },
    { label:'Synapse Serverless + ADF',val:synapse, color:'#0a9a88' },
  ];

  return (
    <div className="service-card p-5">
      <div className="flex items-center gap-2 mb-4">
        <h3 className="text-base font-semibold text-teal-DEFAULT">TCO Calculator</h3>
        <span className="gdpr-badge">Estimated monthly cost</span>
      </div>
      <p className="text-xs text-gray-400 mb-4">On-premises SQL Server vs Azure SQL vs Synapse Serverless. Estimates only — for illustration. Adjust parameters below.</p>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        {[
          { label:'Data volume (GB)', val:gb, min:50, max:5000, step:50, set:setGb },
          { label:'Analyst users',   val:users, min:1, max:100, step:1, set:setUsers },
          { label:'Queries / day',   val:queries, min:100, max:50000, step:500, set:setQueries },
        ].map(s => (
          <div key={s.label}>
            <div className="flex justify-between mb-1">
              <Label>{s.label}</Label>
              <span className="text-xs font-mono text-teal-DEFAULT">{s.val.toLocaleString()}</span>
            </div>
            <input type="range" min={s.min} max={s.max} step={s.step} value={s.val}
              onChange={e => s.set(Number(e.target.value))} />
          </div>
        ))}
      </div>

      <div className="space-y-3">
        {bars.map(b => (
          <div key={b.label}>
            <div className="flex justify-between mb-1">
              <span className="text-xs text-gray-300">{b.label}</span>
              <span className="text-sm font-bold font-mono" style={{color:b.color}}>€{b.val.toLocaleString()}/mo</span>
            </div>
            <div className="h-5 rounded-full overflow-hidden" style={{background:'#221b56'}}>
              <div className="h-full rounded-full transition-all duration-500"

            </div>
          </div>
        ))}
      </div>
      <p className="text-xs text-gray-500 mt-4">On-prem estimate includes: hardware amortisation, SQL Server licence, storage, DBA cost (partial). Azure estimates: compute + storage + egress. Actual costs vary by SKU, reserved pricing, and workload profile.</p>
    </div>
  );
}

function Quiz() {
  const questions = [
    {
      q:'A Dublin-based fintech must ensure EU citizen data never leaves the EU, including support logs and telemetry. Which Azure feature addresses this?',
      opts:['Azure Private Endpoint','Azure EU Data Boundary','Azure Policy AllowedLocations','RBAC at subscription scope'],
      correct:1,
      explanation:'Azure EU Data Boundary (launched 2023) covers customer data, logs, support interactions and telemetry within EU/EEA — the broadest scope of any hyperscaler commitment.'
    },
    {
      q:'Your Power BI reports refresh every night and occasionally fail at 7am. You want real-time data without scheduled refreshes. What is the correct approach with Azure Synapse?',
      opts:['Import mode with 30-minute refresh','DirectQuery to Synapse Dedicated SQL Pool','DirectQuery to Synapse Serverless SQL Pool over curated ADLS Gen2','Export to CSV and load to Power BI dataset'],
      correct:2,
      explanation:'Serverless SQL Pool provides DirectQuery over Parquet/Delta files in ADLS Gen2 without a data warehouse copy. No refresh latency, charged per TB scanned.'
    },
    {
      q:'You need to deploy resources only in Irish and Dutch Azure regions across all subscriptions. What is the correct governance layer?',
      opts:['Tag each resource group manually','Azure RBAC with custom role','Azure Policy assignment at Management Group scope','Conditional Access policy in Entra ID'],
      correct:2,
      explanation:'Azure Policy AllowedLocations assigned at Management Group scope enforces the constraint across all child subscriptions automatically, with Deny effect blocking non-compliant deployments.'
    },
    {
      q:'Which Azure service should you use for a Python webhook handler that runs for 200ms per call, receives 500,000 calls/month, and should scale to zero?',
      opts:['Azure App Service (Standard S1)','Azure Kubernetes Service','Azure Container Apps','Azure Functions (Consumption plan)'],
      correct:3,
      explanation:'Azure Functions Consumption plan is built for short-lived event-driven workloads. First 1M executions are free. Scale-to-zero by design. 500K calls/month = ~€0 in compute cost.'
    },
    {
      q:'A data engineer wants to call GPT-4o for sentiment classification on customer support tickets. The company\'s GDPR DPA requires data to stay in EU and not train OpenAI\'s models. What is the correct service?',
      opts:['OpenAI API with VPN routing through Ireland','Azure OpenAI Service (westeurope deployment)','Azure AI Language service (built-in sentiment)','Neither — LLMs cannot be used under GDPR'],
      correct:1,
      explanation:'Azure OpenAI Service deploys GPT-4o inside your Azure subscription in your chosen EU region. Customer data does not train OpenAI models. For simpler sentiment tasks, Azure AI Language is cheaper — but Azure OpenAI is the compliant LLM path.'
    },
  ];

  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answers, setAnswers] = useState([]);
  const [done, setDone] = useState(false);

  function pick(idx) {
    if (selected !== null) return;
    setSelected(idx);
  }

  function next() {
    const correct = selected === questions[current].correct;
    const newAnswers = [...answers, { selected, correct }];
    setAnswers(newAnswers);
    if (current + 1 >= questions.length) {
      setDone(true);
    } else {
      setCurrent(c => c + 1);
      setSelected(null);
    }
  }

  function reset() {
    setCurrent(0); setSelected(null); setAnswers([]); setDone(false);
  }

  const score = answers.filter(a => a.correct).length;
  const q = questions[current];

  return (
    <div className="service-card p-5">
      <div className="flex items-center justify-between mb-4">
        <h3 className="text-base font-semibold text-teal-DEFAULT">Knowledge Check — 5 Questions</h3>
        {!done && <span className="text-xs font-mono text-gray-400">{current+1} / {questions.length}</span>}
      </div>

      {done ? (
        <div className="fade-up text-center py-6">
          <p className="text-4xl font-extrabold mb-2" style={{color: score>=4?'#10b981':score>=3?'#fbbf24':'#f87171'}}>{score}/5</p>
          <p className="text-sm text-gray-300 mb-4">{score===5?'Perfect score. Azure-ready.':score>=3?'Solid foundation. Review the explanations above.':'Go through the lab modules again — especially GDPR and compute.'}</p>
          <button onClick={reset} className="text-sm font-semibold px-5 py-2 rounded-lg transition-all"
            style={{background:'#1d085e',border:'1px solid #13d6c1',color:'#13d6c1',cursor:'pointer'}}>
            Retry
          </button>
          <div className="flex justify-center gap-2 mt-4">
            {answers.map((a,i) => (
              <span key={i} className="text-lg">{a.correct?'✅':'❌'}</span>
            ))}
          </div>
        </div>
      ) : (
        <div className="fade-up">
          <p className="text-sm font-semibold text-white mb-4">{q.q}</p>
          <div className="space-y-2 mb-4">
            {q.opts.map((opt, i) => {
              let cls = 'quiz-opt';
              if (selected !== null) {
                if (i === q.correct) cls += ' correct';
                else if (i === selected && i !== q.correct) cls += ' wrong';
              }
              return (
                <div key={i} className={cls} onClick={() => pick(i)}>
                  <span className="text-xs font-mono mr-2 opacity-50">{String.fromCharCode(65+i)}.</span>{opt}
                </div>
              );
            })}
          </div>
          {selected !== null && (
            <div className="fade-up rounded-lg p-3 mb-4" style={{background:'#1a1250',border:'1px solid #2a2060'}}>
              <p className="text-xs text-gray-300"><span className="font-semibold" style={{color: selected===q.correct?'#10b981':'#f87171'}}>{selected===q.correct?'Correct. ':'Incorrect. '}</span>{q.explanation}</p>
            </div>
          )}
          <button onClick={next} disabled={selected===null}
            className="text-sm font-semibold px-5 py-2 rounded-lg transition-all"
            style={{background: selected!==null?'#1d085e':'#0e0829', border:'1px solid', borderColor: selected!==null?'#13d6c1':'#2a2060', color: selected!==null?'#13d6c1':'#4a4a6a', cursor: selected!==null?'pointer':'not-allowed'}}>
            {current+1===questions.length?'See results →':'Next →'}
          </button>
        </div>
      )}
    </div>
  );
}
